<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Доска почета - демо</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07110f;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --text: #f6f1e8;
      --muted: #c8d2c8;
      --gold: #f4c96b;
      --green: #4fb28f;
      --red: #ef6f65;
      --blue: #73a7ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 24%, rgba(79, 178, 143, 0.28), transparent 28%),
        radial-gradient(circle at 76% 12%, rgba(244, 201, 107, 0.24), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(239, 111, 101, 0.18), transparent 28%),
        linear-gradient(135deg, #07110f 0%, #17271e 42%, #10192a 100%);
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .balloons {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .balloon {
      position: absolute;
      left: var(--x);
      bottom: -150px;
      width: var(--size);
      height: calc(var(--size) * 1.28);
      border-radius: 48% 52% 50% 50%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.78), transparent 12%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.12), transparent 38%),
        var(--color);
      box-shadow: inset -12px -18px 22px rgba(0, 0, 0, 0.18), 0 18px 28px rgba(0, 0, 0, 0.18);
      opacity: 0.9;
      animation: floatUp var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .balloon::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 13px solid rgba(255, 255, 255, 0.52);
    }

    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      top: calc(100% + 4px);
      width: 1px;
      height: 86px;
      background: linear-gradient(rgba(255, 255, 255, 0.52), transparent);
      transform: translateX(-50%);
    }

    .sparkle {
      position: fixed;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(244, 201, 107, 0.9);
      box-shadow: 0 0 18px rgba(244, 201, 107, 0.7);
      pointer-events: none;
      z-index: 1;
      animation: twinkle 2.4s ease-in-out infinite;
    }

    .sparkle:nth-child(13) { left: 12%; top: 18%; animation-delay: 0.1s; }
    .sparkle:nth-child(14) { left: 36%; top: 11%; animation-delay: 0.8s; }
    .sparkle:nth-child(15) { left: 68%; top: 16%; animation-delay: 1.3s; }
    .sparkle:nth-child(16) { left: 88%; top: 34%; animation-delay: 0.5s; }
    .sparkle:nth-child(17) { left: 22%; top: 72%; animation-delay: 1.7s; }
    .sparkle:nth-child(18) { left: 78%; top: 76%; animation-delay: 2s; }
    }

    .stage {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 34px clamp(18px, 4vw, 58px) 24px;
      gap: 24px;
      opacity: 0;
      transform: scale(0.985);
      animation: dashboardReveal 900ms ease 3.45s forwards;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 38%, rgba(244, 201, 107, 0.22), transparent 22%),
        radial-gradient(circle at 30% 76%, rgba(79, 178, 143, 0.18), transparent 28%),
        linear-gradient(135deg, #07110f, #13231e 50%, #0b1219);
      animation: introExit 950ms ease 3.2s forwards;
    }

    .intro::before,
    .intro::after {
      content: "";
      position: absolute;
      width: 160vw;
      height: 18vh;
      left: -30vw;
      background: linear-gradient(90deg, transparent, rgba(244, 201, 107, 0.36), rgba(255, 255, 255, 0.42), transparent);
      filter: blur(18px);
      transform: rotate(-14deg);
      animation: lightSweep 2.8s ease-in-out infinite;
    }

    .intro::before {
      top: 18%;
    }

    .intro::after {
      bottom: 16%;
      animation-delay: 650ms;
      opacity: 0.72;
      transform: rotate(12deg);
    }

    .intro-inner {
      position: relative;
      z-index: 1;
      width: min(860px, calc(100vw - 36px));
      text-align: center;
      display: grid;
      justify-items: center;
      padding: clamp(28px, 6vw, 70px);
    }

    .intro-mark {
      width: clamp(154px, 24vw, 240px);
      height: clamp(154px, 24vw, 240px);
      margin: 0 auto 24px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(244, 201, 107, 0.62);
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 255, 255, 0.12), transparent 32%),
        rgba(0, 0, 0, 0.28);
      box-shadow: 0 0 42px rgba(244, 201, 107, 0.28), 0 20px 50px rgba(0, 0, 0, 0.34);
      animation: introPop 900ms cubic-bezier(.2, .9, .2, 1.2) both;
      overflow: hidden;
    }

    .intro-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .intro-kicker {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: clamp(13px, 1.8vw, 18px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
      animation: introText 780ms ease 420ms both;
    }

    .intro-title {
      width: 100%;
      margin: 0 auto;
      text-align: center;
      font-size: clamp(44px, 9.4vw, 112px);
      line-height: 0.88;
      letter-spacing: 0;
      text-shadow: 0 16px 34px rgba(0, 0, 0, 0.44), 0 0 38px rgba(244, 201, 107, 0.26);
      animation: introText 820ms ease 620ms both;
      overflow-wrap: anywhere;
    }

    .intro-subtitle {
      margin: 22px auto 0;
      max-width: 680px;
      color: #e7eee8;
      font-size: clamp(16px, 2.2vw, 24px);
      line-height: 1.38;
      animation: introText 820ms ease 880ms both;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .crest {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(244, 201, 107, 0.48);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(244, 201, 107, 0.22), rgba(79, 178, 143, 0.14));
      box-shadow: 0 0 26px rgba(244, 201, 107, 0.14);
      flex: 0 0 auto;
    }

    .crest svg {
      width: 31px;
      height: 31px;
      fill: none;
      stroke: var(--gold);
      stroke-width: 2;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 5.4vw, 68px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .brand p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: clamp(13px, 1.5vw, 17px);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
      min-width: 44px;
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(244, 201, 107, 0.62);
    }

    button svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.06fr) minmax(320px, 0.94fr);
      align-items: stretch;
      gap: clamp(18px, 3vw, 34px);
      min-height: 0;
    }

    .spotlight {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.06)),
        rgba(4, 13, 12, 0.62);
      box-shadow: var(--shadow);
      min-height: 440px;
      display: grid;
      align-content: end;
      padding: clamp(24px, 4vw, 52px);
    }

    .spotlight::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, rgba(7, 17, 15, 0.1), rgba(7, 17, 15, 0.76)),
        var(--portrait);
      background-size: cover;
      background-position: center;
      transform: scale(1.04);
      transition: opacity 420ms ease, transform 900ms ease;
      opacity: 0.92;
    }

    .spotlight::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 42%;
      background: linear-gradient(0deg, rgba(4, 10, 9, 0.92), transparent);
    }

    .spotlight-content {
      position: relative;
      z-index: 1;
      max-width: 680px;
      animation: rise 620ms ease both;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #191407;
      background: var(--gold);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .spotlight h2 {
      margin: 20px 0 8px;
      font-size: clamp(38px, 6vw, 78px);
      line-height: 0.93;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .spotlight .role {
      color: var(--gold);
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .spotlight .story {
      color: #e7eee8;
      font-size: clamp(16px, 1.8vw, 20px);
      line-height: 1.48;
      max-width: 58ch;
      margin: 0;
    }

    .wall {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      min-height: 0;
    }

    .wall-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }

    .wall-title h3 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-content: start;
    }

    .card {
      position: relative;
      min-height: 172px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      cursor: pointer;
      transform: translateY(16px);
      opacity: 0;
      animation: cardIn 620ms ease forwards;
    }

    .card:nth-child(2) { animation-delay: 90ms; }
    .card:nth-child(3) { animation-delay: 180ms; }
    .card:nth-child(4) { animation-delay: 270ms; }

    .card.active {
      background: var(--panel-strong);
      border-color: rgba(244, 201, 107, 0.72);
    }

    .avatar {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 2px solid rgba(244, 201, 107, 0.82);
      background: var(--avatar);
      background-size: cover;
      background-position: center;
      margin-bottom: 14px;
      box-shadow: 0 0 20px rgba(244, 201, 107, 0.16);
    }

    .card h4 {
      margin: 0 0 5px;
      font-size: 20px;
      line-height: 1.05;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .medal {
      position: absolute;
      top: 14px;
      right: 14px;
      color: var(--gold);
      font-weight: 900;
      font-size: 13px;
      border: 1px solid rgba(244, 201, 107, 0.38);
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(244, 201, 107, 0.09);
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress {
      height: 4px;
      width: min(340px, 46vw);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--gold), var(--red));
      animation: progress 6s linear infinite;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes progress {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes floatUp {
      0% {
        transform: translate3d(0, 0, 0) rotate(-4deg);
      }
      50% {
        transform: translate3d(var(--drift), -58vh, 0) rotate(5deg);
      }
      100% {
        transform: translate3d(calc(var(--drift) * -0.5), -118vh, 0) rotate(-5deg);
      }
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(0.65); opacity: 0.35; }
      50% { transform: scale(1.55); opacity: 1; }
    }

    @keyframes introPop {
      from { opacity: 0; transform: translateY(18px) scale(0.72); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes introText {
      from { opacity: 0; transform: translateY(26px); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes introExit {
      to { opacity: 0; visibility: hidden; transform: scale(1.04); }
    }

    @keyframes dashboardReveal {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes lightSweep {
      0%, 100% { transform: translateX(-22vw) rotate(-14deg); opacity: 0.14; }
      48% { transform: translateX(22vw) rotate(-14deg); opacity: 0.78; }
    }

    @media (max-width: 880px) {
      body {
        overflow: auto;
      }

      .stage {
        min-height: 100svh;
      }

      header,
      footer {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        grid-template-columns: 1fr;
      }

      .spotlight {
        min-height: 470px;
      }
    }

    @media (max-width: 560px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .brand h1 {
        font-size: 38px;
      }

      .controls {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworks" aria-hidden="true"></canvas>
  <section class="intro" id="intro" aria-label="VEGAPHARM">
    <div class="intro-inner">
      <div class="intro-mark" aria-hidden="true">
        <img class="intro-logo" src="vegapharm-logo.webp" alt="" />
      </div>
      <p class="intro-kicker">Доска почета</p>
      <h1 class="intro-title">VEGAPHARM</h1>
      <p class="intro-subtitle">Поздравляем людей, чьи результаты и отношение к делу вдохновляют команду</p>
    </div>
  </section>
  <div class="balloons" aria-hidden="true">
    <span class="balloon" style="--x: 4%; --size: 58px; --color: #ef6f65; --duration: 18s; --delay: -2s; --drift: 42px;"></span>
    <span class="balloon" style="--x: 13%; --size: 46px; --color: #f4c96b; --duration: 22s; --delay: -9s; --drift: -34px;"></span>
    <span class="balloon" style="--x: 23%; --size: 68px; --color: #73a7ff; --duration: 24s; --delay: -15s; --drift: 54px;"></span>
    <span class="balloon" style="--x: 35%; --size: 50px; --color: #4fb28f; --duration: 19s; --delay: -6s; --drift: -44px;"></span>
    <span class="balloon" style="--x: 48%; --size: 62px; --color: #ef6f65; --duration: 26s; --delay: -19s; --drift: 36px;"></span>
    <span class="balloon" style="--x: 59%; --size: 44px; --color: #f4c96b; --duration: 20s; --delay: -11s; --drift: -28px;"></span>
    <span class="balloon" style="--x: 69%; --size: 70px; --color: #4fb28f; --duration: 25s; --delay: -4s; --drift: 48px;"></span>
    <span class="balloon" style="--x: 82%; --size: 54px; --color: #73a7ff; --duration: 21s; --delay: -13s; --drift: -46px;"></span>
    <span class="balloon" style="--x: 92%; --size: 64px; --color: #ef6f65; --duration: 27s; --delay: -21s; --drift: 32px;"></span>
    <span class="balloon" style="--x: 74%; --size: 42px; --color: #f4c96b; --duration: 17s; --delay: -1s; --drift: 30px;"></span>
    <span class="balloon" style="--x: 30%; --size: 42px; --color: #73a7ff; --duration: 23s; --delay: -18s; --drift: -40px;"></span>
    <span class="balloon" style="--x: 8%; --size: 44px; --color: #4fb28f; --duration: 20s; --delay: -14s; --drift: 38px;"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
  </div>

  <div class="stage">
    <header>
      <div class="brand">
        <div class="crest" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 3l2.8 5.7 6.2.9-4.5 4.4 1.1 6.1L12 17.2 6.4 20.1 7.5 14 3 9.6l6.2-.9L12 3z"/>
          </svg>
        </div>
        <div>
          <h1>Доска почета</h1>
          <p>Люди, чьи поступки становятся примером для всех</p>
        </div>
      </div>

      <div class="controls">
        <button id="prev" title="Предыдущий участник" aria-label="Предыдущий участник">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button id="burst" title="Запустить салют" aria-label="Запустить салют">
          <svg viewBox="0 0 24 24"><path d="M12 2v5M12 17v5M4.9 4.9l3.5 3.5M15.6 15.6l3.5 3.5M2 12h5M17 12h5M4.9 19.1l3.5-3.5M15.6 8.4l3.5-3.5"/></svg>
        </button>
        <button id="next" title="Следующий участник" aria-label="Следующий участник">
          <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </header>

    <main>
      <section class="spotlight" id="spotlight" aria-live="polite">
        <div class="spotlight-content" id="spotlightContent"></div>
      </section>

      <aside class="wall">
        <div class="wall-title">
          <h3>Герои месяца</h3>
          <div class="counter" id="counter"></div>
        </div>
        <div class="cards" id="cards"></div>
      </aside>
    </main>

    <footer>
      <span>Демо-презентация для онлайн-экрана, холла или школьного сайта</span>
      <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
    </footer>
  </div>

  <script>
    const heroes = [
      {
        name: "Алина Рахимова",
        role: "Лидер учебных проектов",
        medal: "I",
        tag: "Герой месяца",
        story: "Организовала команду наставников и помогла новичкам подготовить первые исследовательские работы.",
        colors: ["#f4c96b", "#4fb28f"],
        portrait: "linear-gradient(135deg, rgba(244,201,107,.86), rgba(79,178,143,.82)), radial-gradient(circle at 68% 30%, #fff2b8 0 9%, transparent 10%), linear-gradient(90deg, #14342b, #251c12)"
      },
      {
        name: "Тимур Сатторов",
        role: "Инженер идей",
        medal: "II",
        tag: "Открытие сезона",
        story: "Собрал прототип умной станции для кабинета и превратил сложную задачу в понятный командный проект.",
        colors: ["#73a7ff", "#f4c96b"],
        portrait: "linear-gradient(135deg, rgba(115,167,255,.84), rgba(244,201,107,.76)), radial-gradient(circle at 38% 24%, #e8f1ff 0 10%, transparent 11%), linear-gradient(90deg, #101a2a, #30240e)"
      },
      {
        name: "Мадина Юсупова",
        role: "Куратор добрых дел",
        medal: "III",
        tag: "За вклад",
        story: "Запустила волонтерскую неделю, где каждый день был посвящен помощи, заботе и полезным маленьким делам.",
        colors: ["#ef6f65", "#4fb28f"],
        portrait: "linear-gradient(135deg, rgba(239,111,101,.84), rgba(79,178,143,.78)), radial-gradient(circle at 55% 28%, #ffe6dd 0 9%, transparent 10%), linear-gradient(90deg, #301112, #0c2e25)"
      },
      {
        name: "Даниил Орлов",
        role: "Капитан команды",
        medal: "IV",
        tag: "Командный дух",
        story: "Поддержал сборную на городском турнире и показал, как спокойствие лидера помогает побеждать вместе.",
        colors: ["#f4c96b", "#73a7ff"],
        portrait: "linear-gradient(135deg, rgba(244,201,107,.8), rgba(115,167,255,.78)), radial-gradient(circle at 48% 27%, #fff4cf 0 9%, transparent 10%), linear-gradient(90deg, #30250e, #101f35)"
      }
    ];

    const spotlight = document.getElementById("spotlight");
    const spotlightContent = document.getElementById("spotlightContent");
    const cards = document.getElementById("cards");
    const counter = document.getElementById("counter");
    const bar = document.getElementById("bar");
    let current = 0;
    let timer;

    function renderCards() {
      cards.innerHTML = heroes.map((hero, index) => `
        <article class="card ${index === current ? "active" : ""}" data-index="${index}" tabindex="0" aria-label="${hero.name}">
          <div class="medal">${hero.medal}</div>
          <div class="avatar" style="--avatar: ${hero.portrait}"></div>
          <h4>${hero.name}</h4>
          <p>${hero.role}</p>
        </article>
      `).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => setHero(Number(card.dataset.index), true));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") setHero(Number(card.dataset.index), true);
        });
      });
    }

    function setHero(index, celebrate = false) {
      current = (index + heroes.length) % heroes.length;
      const hero = heroes[current];
      spotlight.style.setProperty("--portrait", hero.portrait);
      spotlightContent.style.animation = "none";
      spotlightContent.offsetHeight;
      spotlightContent.style.animation = "";
      spotlightContent.innerHTML = `
        <span class="tag">${hero.tag}</span>
        <h2>${hero.name}</h2>
        <div class="role">${hero.role}</div>
        <p class="story">${hero.story}</p>
      `;
      counter.textContent = `${current + 1} из ${heroes.length}`;
      renderCards();
      restartProgress();
      if (celebrate) firework(innerWidth * 0.5, innerHeight * 0.34, hero.colors);
    }

    function restartProgress() {
      bar.style.animation = "none";
      bar.offsetHeight;
      bar.style.animation = "";
      clearInterval(timer);
      timer = setInterval(() => setHero(current + 1, true), 6000);
    }

    document.getElementById("prev").addEventListener("click", () => setHero(current - 1, true));
    document.getElementById("next").addEventListener("click", () => setHero(current + 1, true));
    document.getElementById("burst").addEventListener("click", () => launchShow());

    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function sizeCanvas() {
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function firework(x, y, colors) {
      for (let i = 0; i < 118; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2.1 + Math.random() * 6.2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 68 + Math.random() * 42,
          age: 0,
          size: 1.4 + Math.random() * 3.6,
          color: colors[Math.floor(Math.random() * colors.length)],
          shape: Math.random() > 0.72 ? "star" : "dot",
          spin: Math.random() * Math.PI
        });
      }
    }

    function launchShow() {
      const hero = heroes[current];
      firework(innerWidth * 0.28, innerHeight * 0.28, hero.colors);
      setTimeout(() => firework(innerWidth * 0.7, innerHeight * 0.22, ["#f4c96b", "#ef6f65"]), 260);
      setTimeout(() => firework(innerWidth * 0.52, innerHeight * 0.42, ["#73a7ff", "#4fb28f"]), 520);
      setTimeout(() => firework(innerWidth * 0.16, innerHeight * 0.5, ["#f4c96b", "#ffffff", "#4fb28f"]), 760);
      setTimeout(() => firework(innerWidth * 0.86, innerHeight * 0.48, ["#73a7ff", "#ffffff", "#ef6f65"]), 980);
    }

    function celebrationLoop() {
      const palettes = [
        ["#f4c96b", "#ffffff", "#ef6f65"],
        ["#73a7ff", "#ffffff", "#4fb28f"],
        ["#ef6f65", "#f4c96b", "#73a7ff"],
        ["#4fb28f", "#f4c96b", "#ffffff"]
      ];
      const count = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          firework(
            innerWidth * (0.12 + Math.random() * 0.76),
            innerHeight * (0.12 + Math.random() * 0.34),
            palettes[Math.floor(Math.random() * palettes.length)]
          );
        }, i * 360);
      }
    }

    function drawStar(x, y, radius, color, alpha, spin) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(spin);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const pointRadius = i % 2 === 0 ? radius * 1.45 : radius * 0.55;
        const angle = (Math.PI * 2 * i) / 10;
        ctx.lineTo(Math.cos(angle) * pointRadius, Math.sin(angle) * pointRadius);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      particles = particles.filter(p => p.age < p.life);
      particles.forEach(p => {
        p.age += 1;
        p.vy += 0.032;
        p.vx *= 0.992;
        p.x += p.vx;
        p.y += p.vy;
        const alpha = 1 - p.age / p.life;
        if (p.shape === "star") {
          drawStar(p.x, p.y, p.size, p.color, alpha, p.spin + p.age * 0.04);
        } else {
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 14;
          ctx.shadowColor = p.color;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }

    addEventListener("resize", sizeCanvas);
    sizeCanvas();
    animate();
    setHero(0, false);
    setTimeout(() => firework(innerWidth * 0.5, innerHeight * 0.38, ["#f4c96b", "#ffffff", "#4fb28f"]), 900);
    setTimeout(launchShow, 3300);
    setInterval(celebrationLoop, 2400);
    setInterval(() => firework(innerWidth * Math.random(), innerHeight * (0.16 + Math.random() * 0.28), ["#f4c96b", "#ffffff"]), 5200);
  </script>
</body>
</html>
